version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: survey_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-survey}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-survey_pass}
      POSTGRES_DB: ${POSTGRES_DB:-survey_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-survey} -d ${POSTGRES_DB:-survey_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - survey_network

  redis:
    image: redis:7-alpine
    container_name: survey_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - survey_network

  backend:
    build:
      context: ../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: survey_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-survey}:${POSTGRES_PASSWORD:-survey_pass}@postgres:5432/${POSTGRES_DB:-survey_db}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    volumes:
      - ../agent-configs:/app/agent-configs:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - survey_network

  celery_worker:
    build:
      context: ../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: survey_celery_worker
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-survey}:${POSTGRES_PASSWORD:-survey_pass}@postgres:5432/${POSTGRES_DB:-survey_db}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ../agent-configs:/app/agent-configs:ro
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - survey_network

  celery_beat:
    build:
      context: ../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: survey_celery_beat
    command: celery -A workers.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-survey}:${POSTGRES_PASSWORD:-survey_pass}@postgres:5432/${POSTGRES_DB:-survey_db}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
    depends_on:
      - postgres
      - redis
    networks:
      - survey_network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    container_name: survey_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - survey_network

volumes:
  postgres_data:
  redis_data:

networks:
  survey_network:
    driver: bridge
